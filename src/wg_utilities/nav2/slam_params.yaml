slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames (must match your TF tree)
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Input
    scan_topic: /scan

    # SLAM mode
    mode: mapping

    # Commonly tuned basics (safe defaults)
    # You can keep these or remove them; they are here to be explicit.
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 0.0   # 0.0 means "use message range_max"
    minimum_time_interval: 0.0