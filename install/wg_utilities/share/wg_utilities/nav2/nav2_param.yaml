# Nav2 Complete Parameter Configuration
# For differential drive robot with LiDAR, IMU, wheel odometry fusion
# Uses SLAM-generated live map for navigation (online SLAM mode)
# No preloaded map file required; robot starts in unknown environment
# Simulation mode enabled (use_sim_time: true)
#
# TUNING GUIDE: This file contains production-ready defaults for a small differential-drive
# robot (e.g., BNL) with online SLAM. Key tuning parameters:
# - Controller: desired_linear_vel, lookahead_dist (path tracking responsiveness)
# - Inflation radius: Safety buffer around obstacles (global=0.6m, local=0.5m)
# - Resolution: 0.05m = 5cm per grid cell (balance between accuracy and CPU)
#
# SLAM publishes live map on /map topic from slam_toolbox.
# Costmaps subscribe to /map for global planning with live obstacle data.

# Planner server: global path planning
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: false

# Controller server: local path tracking
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Simple progress checker
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # Goal checker
    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # Regulated Pure Pursuit controller for differential drive
    # Tuning guide: https://docs.nav2.org/tuning_guide/tuning_params.html
    FollowPath:
      plugin: nav2_regulated_pure_pursuit_controller/RegulatedPurePursuitController
      # Max forward speed (m/s). Tune to robot capabilities: 0.5 m/s is conservative.
      # Increase for faster robots; decrease for tight spaces or safety.
      desired_linear_vel: 0.5
      # Distance ahead on path to aim toward (lookahead). Too small (0.2m) = jerky turns.
      # Too large (1.5m) = overshooting. Typical: 0.5–1.0m. Scale with robot size.
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5  # Alternative to lookahead_dist; use one or both
      # Max rotation speed during heading correction (rad/s).
      # Larger = faster turns; smaller = smoother. Typical: 1.0–2.5 rad/s.
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_amcl_pose_uncertainty: 0.05

# Smoother server: path smoothing (optional but useful)
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1e-10
      max_its: 1000
      do_refinement: true

# Behavior server: recovery behaviors
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading"]
    spin:
      plugin: nav2_behaviors/Spin
      simulate_ahead_time: 1.0
      max_rotational_vel: 1.0
      min_rotational_vel: 0.4
      rotational_acc_lim: 3.2
    backup:
      plugin: nav2_behaviors/BackUp
      max_backup_dur: 2.0
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
      max_speed: 0.26

# Waypoint follower: multi-pose navigation
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false

# Velocity smoother: smooth cmd_vel transitions
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false

# Behavior Tree Navigator
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: true
    groot_zmq_publisher_port: 1666
    groot_zmq_server_port: 1667
    # Default behavior trees (provided by nav2_bt_navigator package)
    default_nav_through_poses_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml
    default_nav_to_pose_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    # Plugin libraries used in behavior trees
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_route_blackboard_updater_bt_node

# Global costmap: full environment map
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      rolling_window: false
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.3

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        enabled: true
        # Subscribe to SLAM-generated map topic
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        # Robot safety buffer (meters). Global inflates full buffer around obstacles.
        # Local uses tighter buffer for reactive avoidance. Tune to robot radius + safety margin.
        # Typical: global=0.6m (full buffer), local=0.5m (tighter for responsiveness).
        # Increase if robot scrapes obstacles; decrease if too conservative.
        inflation_radius: 0.6
        cost_scaling_factor: 3.0

# Local costmap: robot-centric rolling window
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      resolution: 0.05
      rolling_window: true
      width: 3
      height: 3
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.3

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        # Local costmap uses tighter inflation radius for reactive obstacle avoidance.
        # WHY DIFFERENT FROM GLOBAL: Global planning uses full safety buffer; local tracks
        # dynamic obstacles more responsively with reduced margin for tight spaces.
        # Tune based on robot performance: too small (0.3m) = risky; too large (0.8m) = timid.
        inflation_radius: 0.5
        cost_scaling_factor: 3.0

# Lifecycle manager: orchestrates Nav2 node state transitions
nav2_lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - smoother_server
      - behavior_server
      - bt_navigator
      - velocity_smoother
      - waypoint_follower
